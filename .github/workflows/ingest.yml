name: Daily ingestion

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wona-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_VERBOSITY: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ML dependencies (CPU torch)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install transformers sentencepiece

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models-mdeberta-v3-base-v1
          restore-keys: hf-models-

      - name: Run pipeline
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m pipeline.run --verbose || python -m pipeline.run --no-bodies --keyword-only --verbose

      - name: Sync data into frontend
        run: bash scripts/sync_data.sh

      - name: Commit refreshed data
        run: |
          git config user.name "wona-bot"
          git config user.email "bot@wona.news"
          git add data/articles.json frontend/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data: daily ingestion $(date -u +'%Y-%m-%d')"
          git push
