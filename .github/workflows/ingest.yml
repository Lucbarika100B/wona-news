name: Daily ingestion

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Classification mode"
        type: choice
        default: "full_ml"
        options:
          - full_ml
          - keyword

permissions:
  contents: write

concurrency:
  group: wona-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Generous overall ceiling. Step-level timeouts gate the inner work.
    timeout-minutes: 75
    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_VERBOSITY: error
      # Scheduled and dispatch runs default to full_ml. Manual override keyword.
      WONA_MODE: ${{ github.event.inputs.mode || 'full_ml' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ML deps and model cache are only needed for full_ml mode.
      - name: Install ML dependencies (CPU torch)
        if: env.WONA_MODE == 'full_ml'
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install transformers sentencepiece

      - name: Cache HuggingFace models
        if: env.WONA_MODE == 'full_ml'
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models-mdeberta-v3-base-v1
          restore-keys: hf-models-

      # Try full ML first. Step-level timeout caps it at 45 min.
      # continue-on-error: true means if it fails or times out, the next step runs.
      - name: Run pipeline (full ML mode)
        id: ml_run
        if: env.WONA_MODE == 'full_ml'
        continue-on-error: true
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m pipeline.run --verbose

      # Fallback: if full ML didn't succeed, run keyword-only.
      # Reliable, fast (~5-8 min), guarantees data ships even on bad days.
      - name: Fallback to keyword mode (if ML failed or timed out)
        if: env.WONA_MODE == 'full_ml' && steps.ml_run.outcome != 'success'
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "Full ML did not succeed (outcome: ${{ steps.ml_run.outcome }}). Running keyword fallback."
          python -m pipeline.run --keyword-only --verbose

      # Manual override path: user explicitly chose keyword mode.
      - name: Run pipeline (keyword mode, manual override)
        if: env.WONA_MODE == 'keyword'
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m pipeline.run --keyword-only --verbose

      - name: Sync data into frontend
        run: bash scripts/sync_data.sh

      - name: Commit refreshed data
        run: |
          git config user.name "wona-bot"
          git config user.email "bot@wona.news"
          git add data/articles.json frontend/data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          MODE_TAG="$WONA_MODE"
          if [ "${{ steps.ml_run.outcome }}" = "failure" ] || [ "${{ steps.ml_run.outcome }}" = "cancelled" ]; then
            MODE_TAG="$WONA_MODE+fallback"
          fi
          git commit -m "data: daily ingestion $(date -u +'%Y-%m-%d') (mode=$MODE_TAG)"
          git push